<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140" role="img" aria-label="Verified and scam-protect">
  <defs>
    <linearGradient id="rgBadgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="rgBadgeRibbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="rgBadgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Outer shield -->
  <path d="M60 6 L108 22 V70 C108 100 88 122 60 134 C32 122 12 100 12 70 V22 Z"
        fill="url(#rgBadgeGrad)" filter="url(#rgBadgeShadow)" stroke="#fef3c7" stroke-width="2"/>

  <!-- Inner shield highlight -->
  <path d="M60 14 L100 27 V70 C100 96 82 116 60 126 C38 116 20 96 20 70 V27 Z"
        fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>

  <!-- Ribbon banner -->
  <path d="M14 36 L60 36 L106 36 L98 50 L106 64 L60 64 L14 64 L22 50 Z"
        fill="url(#rgBadgeRibbon)" opacity="0.95"/>
  <text x="60" y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="800" fill="#fff" letter-spacing="0.18em">VERIFIED</text>

  <!-- Checkmark -->
  <circle cx="60" cy="92" r="20" fill="#fff" opacity="0.95"/>
  <path d="M50 92 L57 99 L70 85" fill="none" stroke="#059669" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom text -->
  <text x="60" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="7" font-weight="700" fill="#fef3c7" letter-spacing="0.1em">SCAM PROTECT</text>
</svg>
